name: Update Predictions

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache the TimesFM checkpoint so it downloads once, not on every daily run.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-timesfm-2.5-200m-pytorch

      - run: pip install uv

      - run: uv pip install --system neuralforecast yfinance scipy pydantic plotly kaleido "timesfm[torch]"

      - run: |
          python update_pred.py
      
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[UPD] Update predictions"
          git push